name: calc_sphere
description: "CalcSphere — Precision meets personality. A premium multi-utility calculator app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  http: ^1.2.1
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  fl_chart: ^0.68.0
  dio: ^5.7.0

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0
  auto_size_text: ^3.0.0

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  package_info_plus: ^8.1.3
  iconsax: ^0.0.8
  lucide_icons_flutter: ^3.1.14+2
  dynamic_color: ^1.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
